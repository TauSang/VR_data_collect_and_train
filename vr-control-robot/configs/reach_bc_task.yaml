seed: 42

experiment:
  name: reach_right_c5_train_c4_test
  out_dir: ../artifacts/experiments_reach

data:
  train_raw_jsonl:
    - ../../data_collector/collector5/vr-demonstrations-episodes-20260325_111750.jsonl
  train_h5_path: ../artifacts/datasets/reach_train_c5_seq16.h5

  test_raw_jsonl:
    - ../../data_collector/collector4/vr-demonstrations-episodes-20260317_160618.jsonl
  test_h5_path: ../artifacts/datasets/reach_test_c4_seq16.h5

  joint_names:
    - leftShoulder
    - leftUpperArm
    - leftLowerArm
    - leftHand
    - rightShoulder
    - rightUpperArm
    - rightLowerArm
    - rightHand

  use_joint_velocities: true
  include_phase: false
  seq_len: 16
  stride: 1
  label_shift: 0
  hand_filter: right
  include_failures: true

model:
  hidden_dim: 256
  num_layers: 2
  dropout: 0.1

train:
  batch_size: 128
  epochs: 30
  lr: 0.0003
  weight_decay: 0.00001
  val_ratio: 0.2
  log_interval: 20
  grad_clip_norm: 1.0
  early_stop_patience: 8

export:
  out_path: ../artifacts/exported/policy_reach_bc.pt
